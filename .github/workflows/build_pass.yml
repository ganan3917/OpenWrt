name: build_pass

on:
  # 手动触发工作流
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'ImmortalWrt 源码仓库地址'
        required: true
        default: 'https://github.com/immortalwrt/immortalwrt.git'
      REPO_BRANCH:
        description: 'ImmortalWrt 源码分支'
        required: true
        default: 'master'
      CONFIG_FILE:
        description: '自定义配置文件路径（相对于仓库根目录）'
        required: false
        default: 'configs/pass.config'
  # 定时自动触发，这里设置为每周六凌晨 3 点
  schedule:
    - cron: '0 19 * * 0'

env:
  # 缓存目录
  FEEDS_CACHE_DIR: ${{ github.workspace }}/feeds-cache
  SOURCE_CACHE_DIR: ${{ github.workspace }}/source-cache

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt install -y ccache ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
                              bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
                              g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
                              libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
                              libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
                              ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
                              python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
                              unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo mkdir -p ${{ env.FEEDS_CACHE_DIR }}
          sudo mkdir -p ${{ env.SOURCE_CACHE_DIR }}

      - name: Cache feeds
        uses: actions/cache@v3
        id: cache-feeds
        with:
          path: ${{ env.FEEDS_CACHE_DIR }}
          key: ${{ runner.os }}-feeds-${{ hashFiles('scripts/feeds') }}

      - name: Cache source
        uses: actions/cache@v3
        id: cache-source
        with:
          path: ${{ env.SOURCE_CACHE_DIR }}
          key: ${{ runner.os }}-source-${{ github.event.inputs.REPO_URL }}-${{ github.event.inputs.REPO_BRANCH }}

      - name: Clone source code
        run: |
          if [ -d ${{ env.SOURCE_CACHE_DIR }} ]; then
            cp -r ${{ env.SOURCE_CACHE_DIR }} ./immortalwrt
          else
            git clone ${{ github.event.inputs.REPO_URL }} -b ${{ github.event.inputs.REPO_BRANCH }} immortalwrt
            cp -r immortalwrt ${{ env.SOURCE_CACHE_DIR }}
          fi
        working-directory: ${{ github.workspace }}

      - name: Update and install feeds
        run: |
          if [ -d ${{ env.FEEDS_CACHE_DIR }} ]; then
            cp -r ${{ env.FEEDS_CACHE_DIR }}/* ./feeds
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -r feeds ${{ env.FEEDS_CACHE_DIR }}
        working-directory: ${{ github.workspace }}/immortalwrt

      - name: Load custom configuration
        run: |
          if [ -n "${{ github.event.inputs.CONFIG_FILE }}" ]; then
            cp ${{ github.workspace }}/${{ github.event.inputs.CONFIG_FILE }} .config
          else
            # 如果没有提供自定义配置文件，可使用默认配置
            make defconfig
          fi
        working-directory: ${{ github.workspace }}/immortalwrt

      - name: Build firmware
        run: |
          make -j$(nproc) V=s
        working-directory: ${{ github.workspace }}/immortalwrt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-firmware
          path: ${{ github.workspace }}/immortalwrt/bin/targets/*/*/*.bin
