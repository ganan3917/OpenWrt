翻译为中文（简体）
你的磁盘空间快用完了。当机器磁盘空间耗尽时，运行程序将停止工作。剩余可用空间：50MB。
name: Build ImmortalWrt

on:
  # 手动触发工作流
  workflow_dispatch:
  # 定时自动触发，这里设置为每周六凌晨 3 点
  schedule:
    - cron: '0 19 * * *'

env:
  # 手动触发输入参数默认值
  REPO_URL: 'https://github.com/immortalwrt/immortalwrt.git'
  REPO_BRANCH: 'master'
  CONFIG_FILE: 'configs/pass.config'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          unzip vim wget xmlto xxd zlib1g-dev zstd
          
      - name: Combine Disks
        uses: easimon/maximize-build-space@master
        with:
         swap-size-mb: 1024
         temp-reserve-mb: 100
         root-reserve-mb: 1024
        
      - name: Clone source code
        run: |
          git clone ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} immortalwrt
        working-directory: ${{ github.workspace }}

      - name: Load custom configuration
        run: |
            cp ${{ github.workspace }}/${{ env.CONFIG_FILE }} .config
        working-directory: ${{ github.workspace }}/immortalwrt
        
      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
        working-directory: ${{ github.workspace }}/immortalwrt

      - name: Build firmware
        run: |
          make -j$(nproc) V=s
        working-directory: ${{ github.workspace }}/immortalwrt

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-firmware
          path: ${{ github.workspace }}/immortalwrt/bin/targets/*/*/*.bin
问题分析
你给出的是一个 GitHub Actions 的工作流配置文件，用于构建 ImmortalWrt 固件。不过运行时提示磁盘空间不足，剩余仅 50MB，这可能会导致工作流在后续步骤（如克隆代码、编译固件等）因空间不够而失败。
解决方案建议
1. 进一步优化磁盘空间清理
在 Combine Disks 步骤已经使用了 easimon/maximize-build-space 来释放空间，但可以在安装依赖之前再增加一些磁盘清理操作。例如，清理 APT 缓存：
yaml
- name: Clean APT cache
  run: |
    sudo apt-get clean
    sudo rm -rf /var/lib/apt/lists/*
将这个步骤添加到 Set up environment 步骤之前，这样可以提前释放一些磁盘空间。
2. 调整 easimon/maximize-build-space 参数
目前 swap-size-mb 设为 1024MB，temp-reserve-mb 设为 100MB，root-reserve-mb 设为 1024MB。可以尝试进一步调整这些参数，比如增大 swap-size-mb 以利用交换空间，同时适当减少 root-reserve-mb（如果可行的话）。
yaml
- name: Combine Disks
  uses: easimon/maximize-build-space@master
  with:
    swap-size-mb: 2048
    temp-reserve-mb: 100
    root-reserve-mb: 512
3. 避免不必要的依赖安装
在 Set up environment 步骤中安装了大量的依赖包，检查是否有一些包是实际上不需要的。例如，某些开发工具可能在特定的构建过程中并不需要，可以将它们移除。如果不确定，可以分阶段安装依赖，在构建过程中根据报错信息再补充安装。
4. 减少克隆代码的大小
如果仓库很大，可以使用浅克隆（shallow clone）来减少磁盘占用。修改 Clone source code 步骤如下：
yaml
- name: Clone source code
  run: |
    git clone --depth=1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} immortalwrt
  working-directory: ${{ github.workspace }}
--depth=1 参数表示只克隆最新的一次提交，而不是整个仓库的历史记录，这样可以显著减少克隆所需的磁盘空间。
完整修改后的工作流示例
