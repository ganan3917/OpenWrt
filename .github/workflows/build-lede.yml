name: LEDE Automatic Compilation

on:
  # 支持手动触发，并可在触发时输入相关参数
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository to clone (e.g., https://github.com/coolsnowwolf/lede.git)'
        required: false
        default: 'https://github.com/coolsnowwolf/lede.git'
      branch:
        description: 'Branch to clone from the repository'
        required: false
        default: 'master'
      config:
        description: 'Path to custom config file in this repository'
        required: false
        default: 'config'
      feeds:
        description: 'Path to custom feeds.conf.default file in this repository'
        required: false
        default: 'feeds.conf.default'
  # 每天凌晨 3 点自动触发
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：拉取代码
      - name: Checkout current repository
        uses: actions/checkout@v3

      # 第二步：设置环境变量
      - name: Set environment variables
        run: |
          echo "REPO=${{ github.event.inputs.repo || 'https://github.com/coolsnowwolf/lede.git' }}" >> $GITHUB_ENV
          echo "BRANCH=${{ github.event.inputs.branch || 'master' }}" >> $GITHUB_ENV
          echo "CONFIG=${{ github.event.inputs.config || 'config' }}" >> $GITHUB_ENV
          echo "FEEDS=${{ github.event.inputs.feeds || 'feeds.conf.default' }}" >> $GITHUB_ENV
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      # 第三步：安装编译所需依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget curl swig rsync

      # 第四步：克隆指定的 LEDE 仓库和分支
      - name: Clone LEDE repository
        run: git clone -b ${{ env.BRANCH }} ${{ env.REPO }} lede

      # 第五步：替换 feeds.conf.default 文件
      - name: Replace feeds.conf.default
        run: |
          cp ${{ env.FEEDS }} lede/feeds.conf.default

      # 第六步：进入 LEDE 目录并更新软件源
      - name: Update feeds
        working-directory: ./lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 第七步：加载自定义配置文件
      - name: Load custom config
        run: |
          cp ${{ env.CONFIG }} lede/.config

      # 第八步：生成默认配置
      - name: Make defconfig
        working-directory: ./lede
        run: make defconfig

      # 第九步：下载编译所需的软件包
      - name: Download packages
        working-directory: ./lede
        run: make download -j$(nproc)
        env:
          NO_CHECK_HASH: 1

      # 第十步：编译固件
      - name: Compile firmware
        working-directory: ./lede
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "::set-output name=status::success"
        id: build

      # 第十一步：整理编译好的文件
      - name: Organize compiled files
        if: steps.build.outputs.status == 'success'
        run: |
          mkdir -p ${{ env.DATE }}
          cp -r lede/bin/targets/* ${{ env.DATE }}

      # 第十二步：创建并上传 Release
      - name: Create and upload release
        if: steps.build.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.DATE }}
          name: LEDE Build ${{ env.DATE }}
          files: |
            ${{ env.DATE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 第十三步：清理旧的 Releases
      - name: Clean up old releases
        if: steps.build.outputs.status == 'success'
        uses: dev-drprasad/delete-older-releases@v0.2.0
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
